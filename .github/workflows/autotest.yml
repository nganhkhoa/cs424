name: Auto test Redex model

on:
  push:
    branches: [ main, master ]

jobs:
  test:
    if: contains(github.event.head_commit.message, 'ci:')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Racket
        uses: bogdanp/setup-racket@v1.11
        with:
          architecture: 'x64'
          version: 'stable'
          variant: 'CS'

      - name: Run Redex Tests
        run: |
          cd redex/
          raco test base.rkt
          raco test reduction.rkt
